<div class="page-shell">
  <header class="masthead">
    <p class="issue">Issue: {{ issueLabel }}</p>
    <a routerLink="/" class="brand">{{ appName }}</a>
    <p class="tagline">{{ appDescription }}</p>
  </header>

  <header class="site-header">
    <nav aria-label="Primary navigation">
      @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: item.route === '/' }">
          {{ item.label }}
        </a>
      }
    </nav>
  </header>

  <main class="site-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="site-footer">
    <p>© {{ year }} ghibli613</p>
    <p>Built with Angular, designed to evolve with future projects and publications.</p>
    <p>
      <a [href]="socialLinks.github" target="_blank" rel="noopener">GitHub</a>
      ·
      <a [href]="socialLinks.linkedin" target="_blank" rel="noopener">LinkedIn</a>
      ·
      <a [href]="emailLink">Contact</a>
    </p>
  </footer>
</div>
